<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Report Scheduler</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;}
  header{background:#1a1a18;padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .logo{color:#fff;font-size:15px;font-weight:600;}
  .logo span{color:#4a9eff;}
  .badge{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:4px 12px;border-radius:99px;background:rgba(255,255,255,0.1);color:#fff;}
  .dot{width:7px;height:7px;border-radius:50%;background:#4caf50;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  main{max-width:1000px;margin:0 auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem;}
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  @media(max-width:700px){.metrics{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr!important;}}
  .metric{background:#fff;border:1px solid #e3e2de;border-radius:8px;padding:1rem 1.25rem;}
  .metric-label{font-size:11px;color:#9a9a94;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
  .metric-value{font-size:26px;font-weight:600;line-height:1;}
  .metric-value.green{color:#1a8a4a;}
  .metric-value.red{color:#d03030;}
  .metric-value.blue{color:#1a6ef5;}
  .grid{display:grid;grid-template-columns:360px 1fr;gap:1.25rem;}
  .card{background:#fff;border:1px solid #e3e2de;border-radius:12px;overflow:hidden;}
  .card-header{padding:.85rem 1.25rem;border-bottom:1px solid #e3e2de;background:#f9f9f8;display:flex;align-items:center;justify-content:space-between;}
  .card-title{font-size:13px;font-weight:600;}
  .card-body{padding:1.25rem;}
  .config-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0ee;font-size:13px;}
  .config-item:last-child{border-bottom:none;}
  .config-key{color:#9a9a94;font-size:11px;text-transform:uppercase;letter-spacing:.05em;}
  .config-val{font-family:'SF Mono','Fira Code',monospace;font-size:12px;color:#1a1a18;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .config-val.notset{color:#d03030;}
  .btn{width:100%;margin-top:1rem;padding:11px;font-size:13px;font-weight:600;border:none;border-radius:8px;background:#1a1a18;color:#fff;cursor:pointer;transition:background .15s,transform .1s;}
  .btn:hover:not(:disabled){background:#333;}
  .btn:active:not(:disabled){transform:scale(.98);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn-secondary{background:#fff;color:#1a1a18;border:1px solid #e3e2de;margin-top:8px;}
  .btn-secondary:hover:not(:disabled){background:#f5f5f3;}
  .log-wrap{max-height:380px;overflow-y:auto;}
  .log-entry{display:grid;grid-template-columns:70px 1fr 70px;gap:8px;align-items:start;padding:7px 1rem;border-bottom:1px solid #f5f5f3;font-size:12px;font-family:'SF Mono','Fira Code',monospace;}
  .log-entry:hover{background:#f9f9f8;}
  .tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;text-align:center;border:1px solid transparent;}
  .tag.success{background:#edfaf3;color:#1a8a4a;border-color:#b0e8c8;}
  .tag.error{background:#fff0f0;color:#d03030;border-color:#f5b0b0;}
  .tag.info{background:#eef4ff;color:#1a6ef5;border-color:#bbd4fa;}
  .log-msg{color:#5a5a56;line-height:1.4;}
  .log-time{color:#9a9a94;font-size:10px;text-align:right;}
  .log-empty{padding:2rem;text-align:center;color:#9a9a94;font-size:13px;font-family:inherit;}
  .schedule-box{background:#f9f9f8;border:1px solid #e3e2de;border-radius:8px;padding:1rem;margin-top:1rem;}
  .schedule-label{font-size:11px;color:#9a9a94;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
  .time-input{width:100%;padding:8px 12px;font-size:14px;border:1px solid #e3e2de;border-radius:8px;background:#fff;color:#1a1a18;}
  .time-input:focus{outline:none;border-color:#1a6ef5;}
  #toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:10px 18px;border-radius:8px;font-size:13px;border:1px solid;max-width:320px;z-index:100;transition:all .3s;}
  #toast.ok{background:#edfaf3;color:#1a8a4a;border-color:#b0e8c8;}
  #toast.err{background:#fff0f0;color:#d03030;border-color:#f5b0b0;}
  #toast.hide{opacity:0;transform:translateY(8px);pointer-events:none;}
</style>
</head>
<body>
<header>
  <div class="logo">Daily <span>Report</span> Scheduler</div>
  <div class="badge"><span class="dot"></span> Running</div>
</header>

<main>
  <div class="metrics">
    <div class="metric"><div class="metric-label">Reports Sent</div><div class="metric-value green" id="m-sent">0</div></div>
    <div class="metric"><div class="metric-label">Failed</div><div class="metric-value red" id="m-fail">0</div></div>
    <div class="metric"><div class="metric-label">Next Run</div><div class="metric-value blue" style="font-size:14px;padding-top:6px;" id="m-next">—</div></div>
    <div class="metric"><div class="metric-label">Last Run</div><div class="metric-value" style="font-size:14px;padding-top:6px;" id="m-last">Never</div></div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-header"><span class="card-title">Configuration</span></div>
      <div class="card-body">
        <div id="config-items">Loading...</div>

        <div class="schedule-box">
          <div class="schedule-label">Send time (24h format)</div>
          <input class="time-input" type="time" id="send-time" value="08:00"/>
          <div style="font-size:11px;color:#9a9a94;margin-top:6px;">Set SEND_TIME in .env to make permanent</div>
        </div>

        <button class="btn" onclick="sendNow()">&#9993; Send Report Now</button>
        <button class="btn btn-secondary" onclick="loadConfig()">&#8635; Refresh Config</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Live Activity Log</span>
        <button onclick="clearLog()" style="font-size:11px;color:#9a9a94;background:none;border:none;cursor:pointer;">Clear</button>
      </div>
      <div class="log-wrap">
        <div id="log-list">
          <div class="log-empty">Scheduler running — send a report to see activity.</div>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="toast" class="hide"></div>

<script>
const socket = io();
let firstLog = true;

socket.on('connect', () => { loadConfig(); });

socket.on('stats', s => {
  document.getElementById('m-sent').textContent = s.sent;
  document.getElementById('m-fail').textContent = s.failed;
  document.getElementById('m-next').textContent = s.next_run;
  document.getElementById('m-last').textContent = s.last_run;
});

socket.on('log', entry => {
  if (firstLog) { document.getElementById('log-list').innerHTML = ''; firstLog = false; }
  const list = document.getElementById('log-list');
  const el = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="tag ${entry.tag}">${entry.tag}</span><div class="log-msg">${entry.message}</div><span class="log-time">${entry.time}</span>`;
  list.insertBefore(el, list.firstChild);
  if (list.children.length > 80) list.removeChild(list.lastChild);
});

function clearLog() {
  document.getElementById('log-list').innerHTML = '<div class="log-empty">Log cleared.</div>';
  firstLog = true;
}

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    const c = await r.json();
    const items = [
      ['SMTP Host', c.smtp_host],
      ['SMTP User', c.smtp_user],
      ['Send Time', c.send_time],
      ['Report To', c.report_to],
      ['Data File', c.data_file],
    ];
    document.getElementById('config-items').innerHTML = items.map(([k, v]) =>
      `<div class="config-item">
        <span class="config-key">${k}</span>
        <span class="config-val ${v === 'not set' ? 'notset' : ''}">${v}</span>
      </div>`
    ).join('');
    if (c.send_time && c.send_time !== 'not set') {
      document.getElementById('send-time').value = c.send_time;
    }
  } catch(e) {}
}

async function sendNow() {
  const btn = document.querySelector('.btn');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    const r = await fetch('/api/send-now', { method: 'POST' });
    const d = await r.json();
    if (d.ok) toast('Report is being sent — watch the log!', true);
    else toast(d.message || 'Error', false);
  } catch(e) { toast('Could not reach server.', false); }
  setTimeout(() => { btn.disabled = false; btn.innerHTML = '&#9993; Send Report Now'; }, 5000);
}

function toast(msg, ok) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = ok ? 'ok' : 'err';
  setTimeout(() => t.classList.add('hide'), 3000);
}
</script>
</body>
</html>
